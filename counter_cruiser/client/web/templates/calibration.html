<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Counter Cruiser — Zone Calibration</title>
</head>
<body>
  <h1>Zone Calibration</h1>
  <p><a href="{{ url_for('dashboard') }}">Back to dashboard</a></p>
  <div style="position: relative; width: 640px; height: 480px;">
    <img src="{{ url_for('live_feed') }}" alt="Live feed" width="640" height="480"
         style="position: absolute; top: 0; left: 0;">
    <svg id="zone-overlay" width="640" height="480"
         style="position: absolute; top: 0; left: 0; pointer-events: none;"></svg>
  </div>
  <ul id="zone-list"></ul>
  <script>
    let currentVersion = null;

    function polygonToPoints(polygon) {
      return polygon.map(p => p.join(',')).join(' ');
    }

    async function loadZones() {
      const data = await (await fetch('/api/zones')).json();
      currentVersion = data.version;
      const svg = document.getElementById('zone-overlay');
      svg.innerHTML = '';
      const list = document.getElementById('zone-list');
      list.innerHTML = '';
      for (const zone of data.zones) {
        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        poly.setAttribute('points', polygonToPoints(zone.polygon));
        poly.setAttribute('fill', zone.enabled ? 'rgba(0,200,0,0.2)' : 'rgba(128,128,128,0.2)');
        poly.setAttribute('stroke', zone.enabled ? 'green' : 'gray');
        svg.appendChild(poly);

        const li = document.createElement('li');
        li.textContent = `${zone.name} (${zone.enabled ? 'enabled' : 'disabled'}) `;
        const toggleBtn = document.createElement('button');
        toggleBtn.textContent = zone.enabled ? 'Disable' : 'Enable';
        toggleBtn.onclick = () => toggleZone(zone.id, !zone.enabled);
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Delete';
        deleteBtn.onclick = () => deleteZone(zone.id);
        li.appendChild(toggleBtn);
        li.appendChild(deleteBtn);
        list.appendChild(li);
      }
    }

    async function toggleZone(zoneId, enabled) {
      await fetch(`/api/zones/${zoneId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({enabled, version: currentVersion}),
      });
      loadZones();
    }

    async function deleteZone(zoneId) {
      await fetch(`/api/zones/${zoneId}?version=${currentVersion}`, {method: 'DELETE'});
      loadZones();
    }

    loadZones();
  </script>
</body>
</html>
